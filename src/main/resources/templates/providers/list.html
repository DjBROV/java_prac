<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставщики</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="providersTitle">Поставщики</h2>

    <form class="row g-2" method="get" th:action="@{/providers}" id="providersFilterForm">
        <div class="col-md-2">
            <input class="form-control" id="providerIdFilter" name="id" placeholder="ID">
        </div>
        <div class="col-md-2">
            <input class="form-control" id="providerNameFilter" name="name" placeholder="Имя">
        </div>
        <div class="col-md-3">
            <input class="form-control" id="providerAddressFilter" name="address" placeholder="Адрес">
        </div>
        <div class="col-md-2">
            <input class="form-control" id="providerPhoneFilter" name="phoneNum" placeholder="Телефон">
        </div>
        <div class="col-md-3">
            <input class="form-control" id="providerEmailFilter" name="email" placeholder="Email">
        </div>
        <div class="col-12">
            <button class="btn btn-primary" id="searchProvidersButton">Поиск</button>
            <a class="btn btn-success" id="addProviderButton" th:href="@{/providers/new}">+</a>
        </div>
    </form>

    <table class="table table-striped mt-3" id="providersTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Email</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p: ${providers}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.phoneNum}"></td>
            <td th:text="${p.email}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/providers/{id}(id=${p.id})}">Страница</a>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/providers/{id}/edit(id=${p.id})}">Изменить</a>
                <form class="d-inline" method="post" th:action="@{/providers/{id}/delete(id=${p.id})}">
                    <button class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставщик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="providerFormTitle"
        th:text="${provider.id == null ? 'Создание поставщика' : 'Редактирование поставщика'}">
        Поставщик
    </h2>

    <div class="alert alert-danger"
         id="providerFormError"
         th:if="${errorMessage != null}"
         th:text="${errorMessage}">
    </div>

    <form method="post" th:action="@{/providers/save}" class="vstack gap-2" id="providerForm">
        <input type="hidden" name="id" th:value="${provider.id}">

        <div>
            <label class="form-label" for="name">Наименование</label>
            <input class="form-control"
                   id="name"
                   name="name"
                   placeholder="Наименование"
                   th:value="${provider.name}"
                   required>
        </div>

        <div>
            <label class="form-label" for="description">Описание</label>
            <textarea class="form-control"
                      id="description"
                      name="description"
                      placeholder="Описание"
                      rows="3"
                      th:text="${provider.description}">
            </textarea>
        </div>

        <div>
            <label class="form-label" for="address">Адрес</label>
            <input class="form-control"
                   id="address"
                   name="address"
                   placeholder="Адрес"
                   th:value="${provider.address}">
        </div>

        <div>
            <label class="form-label" for="phoneNum">Телефон</label>
            <input class="form-control"
                   id="phoneNum"
                   name="phoneNum"
                   placeholder="Телефон"
                   th:value="${provider.phoneNum}"
                   required>
        </div>

        <div>
            <label class="form-label" for="email">Email</label>
            <input class="form-control"
                   id="email"
                   type="email"
                   name="email"
                   placeholder="Email"
                   th:value="${provider.email}"
                   required>
        </div>

        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-primary" id="saveProviderButton" type="submit">
                Сохранить
            </button>

            <button class="btn btn-outline-secondary" id="resetProviderButton" type="reset">
                Отмена
            </button>

            <a class="btn btn-outline-dark" id="backToProvidersButton" th:href="@{/providers}">
                К списку поставщиков
            </a>
        </div>
    </form>
</main>
</body>
</html>

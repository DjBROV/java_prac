<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Создание или изменение поставщика</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container mt-3"><h2>Создание или изменение поставщика</h2>
    <form method="post" th:action="@{/providers/save}"><input type="hidden" name="id" th:value="${provider.id}">
        <div class="mb-2"><input class="form-control" name="name" placeholder="Наименование" th:value="${provider.name}" required></div>
        <div class="mb-2"><input class="form-control" name="description" placeholder="Описание" th:value="${provider.description}"></div>
        <div class="mb-2"><input class="form-control" name="address" placeholder="Адрес" th:value="${provider.address}"></div>
        <div class="mb-2"><input class="form-control" name="phoneNum" placeholder="Телефон" th:value="${provider.phoneNum}" required></div>
        <div class="mb-2"><input class="form-control" name="email" placeholder="Email" th:value="${provider.email}" required></div>
        <button class="btn btn-primary" type="submit">Сохранить</button> <button class="btn btn-outline-secondary" type="reset">Отмена</button></form>
</main></body></html>

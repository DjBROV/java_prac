<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-4">
    <div class="alert alert-danger" id="errorPanel">
        <h2 id="errorTitle"
            th:text="${errorTitle != null ? errorTitle : 'Произошла ошибка'}">
            Произошла ошибка
        </h2>

        <p id="errorMessage"
           th:text="${errorMessage != null ? errorMessage : (message != null ? message : 'Неизвестная ошибка')}">
            Неизвестная ошибка
        </p>

        <p class="text-muted mb-1" th:if="${path != null}">
            Страница:
            <span id="errorPath" th:text="${path}"></span>
        </p>

        <details class="mt-2" th:if="${details != null}">
            <summary>Подробности</summary>
            <pre class="mt-2 mb-0" id="errorDetails" th:text="${details}"></pre>
        </details>
    </div>

    <div class="d-flex gap-2">
        <a class="btn btn-primary" id="goHomeButton" th:href="@{/}">На главную</a>
        <button class="btn btn-outline-secondary" id="goBackButton" type="button" onclick="history.back()">
            Назад
        </button>
    </div>
</main>
</body>
</html>

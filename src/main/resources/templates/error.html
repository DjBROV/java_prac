<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container mt-4">
    <div class="alert alert-danger" id="errorPanel">
        <h2 id="errorTitle">Произошла ошибка</h2>
        <p id="errorMessage" th:text="${errorMessage}">Неизвестная ошибка</p>
    </div>
</main>
</body>
</html>

<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="supplyFormTitle"
        th:text="${supply.id == null ? 'Создание поставки' : 'Редактирование поставки'}">
        Поставка
    </h2>

    <div class="alert alert-danger"
         id="supplyFormError"
         th:if="${errorMessage != null}"
         th:text="${errorMessage}">
    </div>

    <form class="vstack gap-2" method="post" th:action="@{/supplies/save}" id="supplyForm">
        <input type="hidden" name="id" th:value="${supply.id}">

        <div>
            <label class="form-label" for="providerId">Поставщик</label>
            <select class="form-select" id="providerId" name="providerId" required>
                <option value="">Выберите поставщика</option>
                <option th:each="p : ${providers}"
                        th:value="${p.id}"
                        th:text="${p.id + ' — ' + p.name}"
                        th:selected="${supply.provider != null && p.id == supply.provider.id}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="productId">Товар</label>
            <select class="form-select" id="productId" name="productId" required>
                <option value="">Выберите товар</option>
                <option th:each="p : ${products}"
                        th:value="${p.id}"
                        th:text="${p.id + ' — ' + p.name}"
                        th:selected="${supply.product != null && p.id == supply.product.id}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="amount">Количество</label>
            <input class="form-control"
                   id="amount"
                   type="number"
                   min="1"
                   name="amount"
                   placeholder="Количество"
                   th:value="${supply.amount}"
                   required>
        </div>

        <div>
            <label class="form-label" for="time">Время поставки</label>
            <input class="form-control"
                   id="time"
                   type="datetime-local"
                   name="time"
                   th:value="${supply.time}"
                   required>
        </div>

        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-primary" id="saveSupplyButton" type="submit">
                Сохранить
            </button>

            <button class="btn btn-outline-secondary" id="resetSupplyButton" type="reset">
                Отмена
            </button>

            <a class="btn btn-outline-dark" id="backToSuppliesButton" th:href="@{/supplies}">
                К списку поставок
            </a>
        </div>
    </form>
</main>
</body>
</html>

<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Поставка</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container mt-3"><h2 th:text="${supply.id == null ? 'Создание поставки' : 'Редактирование поставки'}"></h2>
    <form class="vstack gap-2" method="post" th:action="@{/supplies/save}">
        <input type="hidden" name="id" th:value="${supply.id}">
        <select class="form-select" name="providerId" required><option value="">Поставщик</option><option th:each="p:${providers}" th:value="${p.id}" th:text="${p.name}" th:selected="${supply.provider != null && p.id == supply.provider.id}"></option></select>
        <select class="form-select" name="productId" required><option value="">Товар</option><option th:each="p:${products}" th:value="${p.id}" th:text="${p.name}" th:selected="${supply.product != null && p.id == supply.product.id}"></option></select>
        <input class="form-control" type="number" min="1" name="amount" placeholder="Количество" th:value="${supply.amount}" required>
        <input class="form-control" type="datetime-local" name="time" th:value="${supply.time}" required>
        <div><button class="btn btn-primary">Сохранить</button> <button type="reset" class="btn btn-outline-secondary">Отмена</button></div>
    </form></main></body></html>

<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="suppliesTitle">Поставки</h2>

    <form class="row g-2" method="get" th:action="@{/supplies}" id="suppliesFilterForm">
        <div class="col"><input class="form-control" id="supplyProviderIdFilter" name="providerId" placeholder="ID поставщика"></div>
        <div class="col"><input class="form-control" id="supplyProductNameFilter" name="productName" placeholder="Товар"></div>
        <div class="col"><input class="form-control" id="supplyAmountFromFilter" name="amountFrom" placeholder="Количество от"></div>
        <div class="col"><input class="form-control" id="supplyAmountToFilter" name="amountTo" placeholder="до"></div>
        <div class="col"><input type="datetime-local" class="form-control" id="supplyTimeFromFilter" name="timeFrom"></div>
        <div class="col"><input type="datetime-local" class="form-control" id="supplyTimeToFilter" name="timeTo"></div>
        <div class="col">
            <select class="form-select" id="supplyCompletedFilter" name="completed">
                <option value="">Любой статус</option>
                <option value="true">Выполнена</option>
                <option value="false">Не выполнена</option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" id="searchSuppliesButton" type="submit">Поиск</button>
            <a class="btn btn-success" id="addSupplyButton" th:href="@{/supplies/new}">+</a>
        </div>
    </form>

    <table class="table table-striped mt-3" id="suppliesTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Товар</th>
            <th>Поставщик</th>
            <th>Кол-во</th>
            <th>Дата</th>
            <th>Статус</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s: ${supplies}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.product != null ? s.product.name : '-'}"></td>
            <td th:text="${s.provider != null ? s.provider.name : '-'}"></td>
            <td th:text="${s.amount}"></td>
            <td th:text="${s.time != null ? #temporals.format(s.time, 'dd.MM.yyyy HH:mm') : '-'}"></td>
            <td th:text="${s.completed ? 'Выполнена' : 'Не выполнена'}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{/supplies/{id}(id=${s.id})}">
                    Страница
                </a>

                <a class="btn btn-sm btn-outline-secondary"
                   th:if="${!s.completed}"
                   th:href="@{/supplies/{id}/edit(id=${s.id})}">
                    Изменить
                </a>

                <form class="d-inline" method="post" th:action="@{/supplies/{id}/delete(id=${s.id})}">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

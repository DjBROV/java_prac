<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2>Поставка #<span th:text="${supply.id}"></span></h2>

    <ul class="list-group mb-3">
        <li class="list-group-item">
            Товар:
            <span th:text="${supply.product != null ? supply.product.name : '-'}"></span>
        </li>
        <li class="list-group-item">
            Количество:
            <span th:text="${supply.amount}"></span>
        </li>
        <li class="list-group-item">
            Время:
            <span th:text="${supply.time != null ? #temporals.format(supply.time, 'dd.MM.yyyy HH:mm') : '-'}"></span>
        </li>
        <li class="list-group-item">
            Поставщик:
            <a th:if="${provider != null}"
               th:href="@{/providers/{id}(id=${provider.id})}"
               th:text="${provider.name}">
            </a>
            <span th:if="${provider == null}">-</span>
        </li>
        <li class="list-group-item">
            Статус:
            <span th:text="${supply.completed ? 'Выполнена' : 'Не выполнена'}"></span>
        </li>
    </ul>

    <form method="post"
          th:if="${!supply.completed}"
          th:action="@{/supplies/{id}/complete(id=${supply.id})}">
        <button class="btn btn-primary" type="submit">Выполнить поставку</button>
    </form>

    <h4 class="mt-4">Товарные единицы поставки</h4>

    <table class="table table-sm">
        <thead>
        <tr>
            <th>ID</th>
            <th>Количество</th>
            <th>Полка</th>
            <th>Зарезервировано</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u:${units}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.amount}"></td>
            <td th:text="${u.shelf != null ? (u.shelf.roomNum + '/' + u.shelf.id) : '-'}"></td>
            <td th:text="${u.order != null ? 'Да' : 'Нет'}"></td>
        </tr>
        </tbody>
    </table>

    <a class="btn btn-outline-dark mt-2" th:href="@{/supplies}">К списку поставок</a>
</main>
</body>
</html>

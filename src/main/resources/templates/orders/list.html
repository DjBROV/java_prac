<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="ordersTitle">Заказы</h2>

    <form class="row g-2" method="get" th:action="@{/orders}" id="ordersFilterForm">
        <div class="col"><input class="form-control" id="orderConsumerIdFilter" name="consumerId" placeholder="ID потребителя"></div>
        <div class="col"><input class="form-control" id="orderProductNameFilter" name="productName" placeholder="Товар"></div>
        <div class="col"><input class="form-control" id="orderAmountFromFilter" name="amountFrom" placeholder="Количество от"></div>
        <div class="col"><input class="form-control" id="orderAmountToFilter" name="amountTo" placeholder="до"></div>
        <div class="col"><input type="datetime-local" class="form-control" id="orderTimeFromFilter" name="timeFrom"></div>
        <div class="col"><input type="datetime-local" class="form-control" id="orderTimeToFilter" name="timeTo"></div>
        <div class="col">
            <select class="form-select" id="orderCompletedFilter" name="completed">
                <option value="">Любой статус</option>
                <option value="true">Выполнен</option>
                <option value="false">Не выполнен</option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" id="searchOrdersButton">Поиск</button>
            <a class="btn btn-success" id="addOrderButton" th:href="@{/orders/new}">+</a>
        </div>
    </form>

    <table class="table table-striped mt-3" id="ordersTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Товар</th>
            <th>Потребитель</th>
            <th>Кол-во</th>
            <th>Дата</th>
            <th>Статус</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o: ${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.product.name}"></td>
            <td th:text="${o.consumer.name}"></td>
            <td th:text="${o.amount}"></td>
            <td th:text="${o.time}"></td>
            <td th:text="${o.completed ? 'Выполнен' : 'Не выполнен'}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/orders/{id}(id=${o.id})}">Страница</a>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/orders/{id}/edit(id=${o.id})}">Изменить</a>
                <form class="d-inline" method="post" th:action="@{/orders/{id}/delete(id=${o.id})}">
                    <button class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

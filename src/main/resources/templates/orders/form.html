<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="orderFormTitle"
        th:text="${order.id == null ? 'Создание заказа' : 'Редактирование заказа'}">
        Заказ
    </h2>

    <div class="alert alert-danger"
         id="orderFormError"
         th:if="${errorMessage != null}"
         th:text="${errorMessage}">
    </div>

    <form class="vstack gap-2" method="post" th:action="@{/orders/save}" id="orderForm">
        <input type="hidden" name="id" th:value="${order.id}">

        <div>
            <label class="form-label" for="consumerId">Потребитель</label>
            <select class="form-select" id="consumerId" name="consumerId" required>
                <option value="">Выберите потребителя</option>
                <option th:each="c : ${consumers}"
                        th:value="${c.id}"
                        th:text="${c.id + ' — ' + c.name}"
                        th:selected="${order.consumer != null && c.id == order.consumer.id}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="productId">Товар</label>
            <select class="form-select" id="productId" name="productId" required>
                <option value="">Выберите товар</option>
                <option th:each="p : ${products}"
                        th:value="${p.id}"
                        th:text="${p.id + ' — ' + p.name}"
                        th:selected="${order.product != null && p.id == order.product.id}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="amount">Количество</label>
            <input class="form-control"
                   id="amount"
                   type="number"
                   min="1"
                   name="amount"
                   placeholder="Количество"
                   th:value="${order.amount}"
                   required>
        </div>

        <div>
            <label class="form-label" for="time">Время заказа</label>
            <input class="form-control"
                   id="time"
                   type="datetime-local"
                   name="time"
                   th:value="${order.time}"
                   required>
        </div>

        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-primary" id="saveOrderButton" type="submit">
                Сохранить
            </button>

            <button class="btn btn-outline-secondary" id="resetOrderButton" type="reset">
                Отмена
            </button>

            <a class="btn btn-outline-dark" id="backToOrdersButton" th:href="@{/orders}">
                К списку заказов
            </a>
        </div>
    </form>
</main>
</body>
</html>

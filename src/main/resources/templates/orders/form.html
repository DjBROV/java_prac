<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Заказ</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container mt-3"><h2 th:text="${order.id == null ? 'Создание заказа' : 'Редактирование заказа'}"></h2>
    <form class="vstack gap-2" method="post" th:action="@{/orders/save}">
        <input type="hidden" name="id" th:value="${order.id}">
        <select class="form-select" name="consumerId" required><option value="">Потребитель</option><option th:each="c:${consumers}" th:value="${c.id}" th:text="${c.name}" th:selected="${order.consumer != null && c.id == order.consumer.id}"></option></select>
        <select class="form-select" name="productId" required><option value="">Товар</option><option th:each="p:${products}" th:value="${p.id}" th:text="${p.name}" th:selected="${order.product != null && p.id == order.product.id}"></option></select>
        <input class="form-control" type="number" min="1" name="amount" placeholder="Количество" th:value="${order.amount}" required>
        <input class="form-control" type="datetime-local" name="time" th:value="${order.time}" required>
        <div><button class="btn btn-primary">Сохранить</button> <button type="reset" class="btn btn-outline-secondary">Отмена</button></div>
    </form></main></body></html>

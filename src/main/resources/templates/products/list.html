<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Товары</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="productsTitle">Товары</h2>

    <form class="row g-2" method="get" th:action="@{/products}" id="productsFilterForm">
        <div class="col-md-2">
            <input class="form-control" id="productIdFilter" name="id" placeholder="ID">
        </div>
        <div class="col-md-3">
            <input class="form-control" id="productNameFilter" name="name" placeholder="Наименование">
        </div>
        <div class="col-md-2">
            <input class="form-control" id="categoryIdFilter" name="categoryId" placeholder="ID категории">
        </div>

        <!-- ДОБАВЛЕНО -->
        <div class="col-md-3">
            <input class="form-control" id="categoryNameFilter" name="categoryName" placeholder="Название категории">
        </div>
        <div class="col-md-2">
            <select class="form-select" id="unitFilter" name="unit">
                <option value="">Ед. изм.</option>
                <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <select class="form-select" id="sizeFilter" name="size">
                <option value="">Габариты</option>
                <option th:each="s : ${sizes}" th:value="${s}" th:text="${s}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <input class="form-control" id="minStorageDaysFilter" type="number" min="0" name="minStorageDays" placeholder="Срок от, дн">
        </div>
        <div class="col-md-2">
            <input class="form-control" id="maxStorageDaysFilter" type="number" min="0" name="maxStorageDays" placeholder="Срок до, дн">
        </div>
        <div class="col-md-2 d-flex align-items-center">
            <div class="form-check mt-1">
                <input class="form-check-input" type="checkbox" id="largeFilter" name="large" value="true">
                <label class="form-check-label" for="largeFilter">Крупногабаритный</label>
            </div>
        </div>

        <div class="col-md-4">
            <button class="btn btn-primary" id="searchProductsButton" type="submit">Поиск</button>
            <a class="btn btn-success" id="addProductButton" th:href="@{/products/new}">+</a>
        </div>
    </form>

    <table class="table table-striped mt-3" id="productsTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Наименование</th>
            <th>Категория</th>
            <th>Ед. изм.</th>
            <th>Габариты</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category != null ? p.category.name : '-'}"></td>
            <td th:text="${p.unit != null ? p.unit : '-'}"></td>
            <td th:text="${p.product_size != null ? p.product_size : '-'}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/products/{id}(id=${p.id})}">Страница</a>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/products/{id}/edit(id=${p.id})}">Изменить</a>
                <form class="d-inline" method="post" th:action="@{/products/{id}/delete(id=${p.id})}">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

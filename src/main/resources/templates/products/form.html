<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Создание или изменение товара</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container mt-3">
    <h2 id="productEditTitle">Создание или изменение товара</h2>
    <form method="post" th:action="@{/products/save}" id="productForm">
        <input type="hidden" name="id" th:value="${product.id}">
        <div class="mb-2"><label class="form-label">Наименование</label><input class="form-control" id="productName" name="name" th:value="${product.name}" required></div>
        <div class="mb-2"><label class="form-label">Описание</label><textarea class="form-control" id="productDescription" name="description" th:text="${product.description}"></textarea></div>
        <div class="mb-2"><label class="form-label">Категория</label>
            <select class="form-select" id="productCategory" name="categoryId" required>
                <option th:each="c: ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${product.category != null and product.category.id == c.id}"></option>
            </select>
        </div>
        <div class="row">
            <div class="col mb-2"><label class="form-label">Ед. изм.</label><select class="form-select" name="unit"><option value="">-</option><option th:each="u : ${units}" th:value="${u}" th:text="${u}" th:selected="${product.unit == u}"></option></select></div>
            <div class="col mb-2"><label class="form-label">Габариты</label><select class="form-select" name="product_size"><option value="">-</option><option th:each="s : ${sizes}" th:value="${s}" th:text="${s}" th:selected="${product.product_size == s}"></option></select></div>
        </div>
        <div class="mb-2"><label class="form-label">Срок хранения (дней)</label><input class="form-control" type="number" name="storageLifeDays"></div>
        <button class="btn btn-primary" id="submitProductButton" type="submit">Сохранить</button>
        <button class="btn btn-outline-secondary" type="reset">Отмена</button>
    </form>
</main>
</body>
</html>

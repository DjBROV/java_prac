<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="productFormTitle"
        th:text="${product.id == null ? 'Создание товара' : 'Редактирование товара'}">
        Товар
    </h2>

    <div class="alert alert-danger"
         id="productFormError"
         th:if="${errorMessage != null}"
         th:text="${errorMessage}">
    </div>

    <form class="vstack gap-2" method="post" th:action="@{/products/save}" id="productForm">
        <input type="hidden" name="id" th:value="${product.id}">

        <div>
            <label class="form-label" for="categoryId">Категория</label>
            <select class="form-select" id="categoryId" name="categoryId" required>
                <option value="">Выберите категорию</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.id + ' — ' + c.name}"
                        th:selected="${product.category != null && c.id == product.category.id}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="name">Наименование</label>
            <input class="form-control"
                   id="name"
                   name="name"
                   placeholder="Наименование"
                   th:value="${product.name}"
                   required>
        </div>

        <div>
            <label class="form-label" for="description">Описание</label>
            <textarea class="form-control"
                      id="description"
                      name="description"
                      placeholder="Описание"
                      rows="3"
                      th:text="${product.description}">
            </textarea>
        </div>

        <div>
            <label class="form-label" for="unit">Единица измерения</label>
            <select class="form-select" id="unit" name="unit">
                <option value="">Выберите единицу измерения</option>
                <option th:each="u : ${units}"
                        th:value="${u}"
                        th:text="${u}"
                        th:selected="${product.unit != null && u == product.unit}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="product_size">Габариты</label>
            <select class="form-select" id="product_size" name="product_size">
                <option value="">Выберите габариты</option>
                <option th:each="s : ${sizes}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${product.product_size != null && s == product.product_size}">
                </option>
            </select>
        </div>

        <div>
            <label class="form-label" for="unitsForOne">Единиц за одну позицию</label>
            <input class="form-control"
                   id="unitsForOne"
                   type="number"
                   min="1"
                   name="unitsForOne"
                   placeholder="Единиц за одну позицию"
                   th:value="${product.unitsForOne}">
        </div>

        <div>
            <label class="form-label" for="storageLifeDays">Срок хранения, дней</label>
            <input class="form-control"
                   id="storageLifeDays"
                   type="number"
                   min="0"
                   name="storageLifeDays"
                   placeholder="Срок хранения в днях"
                   th:value="${product.storageLife != null ? product.storageLife.toDays() : ''}">
        </div>

        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-primary" id="saveProductButton" type="submit">
                Сохранить
            </button>

            <button class="btn btn-outline-secondary" id="resetProductButton" type="reset">
                Отмена
            </button>

            <a class="btn btn-outline-dark" id="backToProductsButton" th:href="@{/products}">
                К списку товаров
            </a>
        </div>
    </form>
</main>
</body>
</html>

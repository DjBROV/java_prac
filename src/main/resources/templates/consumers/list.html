<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Потребители</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="consumersTitle">Потребители</h2>

    <form class="row g-2" method="get" th:action="@{/consumers}" id="consumersFilterForm">
        <div class="col-md-2">
            <input class="form-control" id="consumerIdFilter" name="id" placeholder="ID">
        </div>
        <div class="col-md-2">
            <input class="form-control" id="consumerNameFilter" name="name" placeholder="Имя">
        </div>
        <div class="col-md-3">
            <input class="form-control" id="consumerAddressFilter" name="address" placeholder="Адрес">
        </div>
        <div class="col-md-2">
            <input class="form-control" id="consumerPhoneFilter" name="phoneNum" placeholder="Телефон">
        </div>
        <div class="col-md-3">
            <input class="form-control" id="consumerEmailFilter" name="email" placeholder="Email">
        </div>
        <div class="col-12">
            <button class="btn btn-primary" id="searchConsumersButton">Поиск</button>
            <a class="btn btn-success" id="addConsumerButton" th:href="@{/consumers/new}">+</a>
        </div>
    </form>

    <table class="table table-striped mt-3" id="consumersTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Email</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c: ${consumers}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
            <td th:text="${c.phoneNum}"></td>
            <td th:text="${c.email}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/consumers/{id}(id=${c.id})}">Страница</a>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/consumers/{id}/edit(id=${c.id})}">Изменить</a>
                <form class="d-inline" method="post" th:action="@{/consumers/{id}/delete(id=${c.id})}">
                    <button class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

<!doctype html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Категория</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container mt-3"><h2 th:text="${category.id == null ? 'Создание категории' : 'Редактирование категории'}"></h2>
    <form method="post" th:action="@{/categories/save}" class="vstack gap-2">
        <input type="hidden" name="id" th:value="${category.id}">
        <input class="form-control" name="name" placeholder="Наименование" th:value="${category.name}" required>
        <div><button class="btn btn-primary">Отправить</button> <button type="reset" class="btn btn-outline-secondary">Отмена</button></div>
    </form></main></body></html>

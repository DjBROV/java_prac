<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Категория</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="categoryFormTitle"
        th:text="${category.id == null ? 'Создание категории' : 'Редактирование категории'}">
        Категория
    </h2>

    <div class="alert alert-danger"
         id="categoryFormError"
         th:if="${errorMessage != null}"
         th:text="${errorMessage}">
    </div>

    <form method="post" th:action="@{/categories/save}" class="vstack gap-2" id="categoryForm">
        <input type="hidden" name="id" th:value="${category.id}">

        <div>
            <label class="form-label" for="name">Наименование</label>
            <input class="form-control"
                   id="name"
                   name="name"
                   placeholder="Наименование"
                   th:value="${category.name}"
                   required>
        </div>

        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-primary" id="saveCategoryButton" type="submit">
                Отправить
            </button>

            <button type="reset" class="btn btn-outline-secondary" id="resetCategoryButton">
                Отмена
            </button>

            <a class="btn btn-outline-dark" id="backToCategoriesButton" th:href="@{/categories}">
                К списку категорий
            </a>
        </div>
    </form>
</main>
</body>
</html>

<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Категории</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mt-3">
    <h2 id="categoriesTitle">Категории товаров</h2>

    <form class="row g-2" method="get" th:action="@{/categories}" id="categoriesFilterForm">
        <div class="col-md-2">
            <input class="form-control" id="categoryIdFilter" name="id" placeholder="ID">
        </div>
        <div class="col-md-4">
            <input class="form-control" id="categoryNameFilter" name="name" placeholder="Наименование">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" id="searchCategoriesButton">Поиск</button>
            <a class="btn btn-success" id="addCategoryButton" th:href="@{/categories/new}">+</a>
        </div>
    </form>

    <table class="table table-striped mt-3" id="categoriesTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Наименование</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c: ${categories}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/products(categoryId=${c.id})}">Товары</a>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/categories/{id}/edit(id=${c.id})}">Изменить</a>
                <form class="d-inline" method="post" th:action="@{/categories/{id}/delete(id=${c.id})}">
                    <button class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
